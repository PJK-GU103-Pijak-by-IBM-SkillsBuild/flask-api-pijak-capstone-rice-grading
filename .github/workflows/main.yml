name: CI/CD Flask API Rice Grading
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE
    - uses: actions/checkout@v3
    - name: Check Docker Hub credentials
      if: github.event_name == 'push'
      run: |
        if [ -z "${{ vars.DOCKER_HUB_USERNAME_ARY }}" ]; then
          echo "DOCKER_HUB_USERNAME_ARY variable is empty or not available"
          exit 1
        fi

        if [ -z "${{ secrets.DOCKER_HUB_ACCESS_TOKEN_ARY }}" ]; then
          echo "DOCKER_HUB_ACCESS_TOKEN_ARY secret is empty or not available"
          exit 1
        fi
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ vars.DOCKER_HUB_USERNAME_ARY }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN_ARY }}

    - name: Build & Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' }}
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ vars.DOCKER_HUB_USERNAME_ARY }}/api-rice-grading-flask:latest
          ${{ vars.DOCKER_HUB_USERNAME_ARY }}/api-rice-grading-flask:${{ github.sha }}
