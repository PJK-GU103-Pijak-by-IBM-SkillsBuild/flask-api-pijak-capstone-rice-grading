name: CI/CD Flask API Rice Grading
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE
    - uses: actions/checkout@v3
    - name: Check Docker Hub credentials
      if: github.event_name == 'push'
      run: |
        if [ -z "${{ vars.DOCKER_HUB_USERNAME_ARY }}" ]; then
          echo "DOCKER_HUB_USERNAME variable is empty or not available"
          exit 1
        fi

        if [ -z "${{ secrets.DOCKER_HUB_ACCESS_TOKEN_ARY }}" ]; then
          echo "DOCKER_HUB_ACCESS_TOKEN_ARY secret is empty or not available"
          exit 1
        fi
    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ vars.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Build Docker image
      run: |
        docker build \
        -t ${{ vars.DOCKER_HUB_USERNAME_ARY }}/api-rice-grading-flask:latest \
        -t ${{ vars.DOCKER_HUB_USERNAME_ARY }}/api-rice-grading-flask:${{ github.sha }} \
        .
    - name: Push Docker Image
      if: github.event_name == 'push'
      run: |
        docker push ${{ vars.DOCKER_HUB_USERNAME_ARY }}/api-rice-grading-flask:latest
        docker push ${{ vars.DOCKER_HUB_USERNAME_ARY }}/api-rice-grading-flask:${{ github.sha }}
